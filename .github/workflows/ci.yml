name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with Ruff
        run: ruff check .
            - name: Run tests
        env:
          # Фиктивные значения для тестов (реальные запросы не делаются)
          GIGACHAT_CLIENT_ID: test-client-id
          GIGACHAT_CLIENT_SECRET: test-client-secret
          GIGACHAT_SCOPE: GIGACHAT_API_PERS
          LLM_MODEL: GigaChat:latest
          LLM_TIMEOUT: 30
          CACHE_TTL_SECONDS: 300
          LOG_LEVEL: WARNING  # Чтобы не спамить логами в CI
        run: pytest tests/ -v
